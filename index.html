<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voucher Pro - Credible</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        select { appearance: none; -webkit-appearance: none; background-image: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // הכתובת המעודכנת מהתמונות שלך
        const GOOGLE_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwNtLKFJo43qD8zma3J4la0MGnRtxn6eX-uE0g943zL2DshAlRWkDmebXrkyEFkjR3_/exec';
        
        const AREA_MANAGERS = {
            '037122595': 'טירן סיגורה',
            '040476012': 'נחום נחום',
            '034887919': 'שי סיידון',
            '021710553': 'אהוד מועלם',
            '066436098': 'עזרא ירימי'
        };
        const ADMIN_CODE = 'credible';

        const MANAGER_COLORS = {
            'טירן סיגורה': '#3b82f6',
            'נחום נחום': '#8b5cf6',
            'שי סיידון': '#10b981',
            'אהוד מועלם': '#f59e0b',
            'עזרא ירימי': '#ef4444',
            'p2p': '#64748b'
        };

        const HEBREW_MONTHS = {
            '01': 'ינואר', '02': 'פברואר', '03': 'מרץ', '04': 'אפריל',
            '05': 'מאי', '06': 'יוני', '07': 'יולי', '08': 'אוגוסט',
            '09': 'ספטמבר', '10': 'אוקטובר', '11': 'נובמבר', '12': 'דצמבר'
        };

        function App() {
            const [user, setUser] = useState(null);
            const [cache, setCache] = useState({}); 
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [errorMsg, setErrorMsg] = useState('');
            
            const [month, setMonth] = useState('04'); 
            const [year, setYear] = useState('2026');

            const currentKey = `${month}-${year}`;

            useEffect(() => {
                const saved = sessionStorage.getItem('v_auth_final');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setUser(parsed);
                    fetchData('04', '2026', false); 
                }
            }, []);

            const fetchData = async (m, y, forceRefresh = false) => {
                const key = `${m}-${y}`;
                
                if (cache[key] && !forceRefresh) {
                    setMonth(m);
                    setYear(y);
                    return;
                }

                setLoading(true);
                setErrorMsg('');
                try {
                    const response = await fetch(`${GOOGLE_WEB_APP_URL}?action=get&month=${m}&year=${y}`);
                    const res = await response.json();
                    
                    if (res.status === 'success') {
                        setCache(prev => ({
                            ...prev,
                            [key]: res.data
                        }));
                        setMonth(m);
                        setYear(y);
                    } else {
                        setErrorMsg(`לשונית ${HEBREW_MONTHS[m]} ${y.slice(-2)} לא נמצאה בגיליון.`);
                        setMonth(m);
                        setYear(y);
                    }
                } catch (e) {
                    setErrorMsg("שגיאת תקשורת מול גוגל.");
                } finally {
                    setLoading(false);
                }
            };

            const handleUpdate = async (id, status) => {
                setCache(prev => {
                    const currentData = prev[currentKey] || [];
                    const updatedData = currentData.map(v => 
                        v.id === id ? {...v, status: status === 'delivered' ? 'נמסר' : 'לא נותנים'} : v
                    );
                    return { ...prev, [currentKey]: updatedData };
                });

                try {
                    await fetch(GOOGLE_WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'updateStatus', id, status, month, year })
                    });
                } catch (e) { console.error(e); }
            };

            const vouchersToShow = useMemo(() => {
                const data = cache[currentKey] || [];
                return data.filter(v => {
                    const matchSearch = !searchTerm || [v.agentName, v.agency, v.customerName].some(f => String(f||'').toLowerCase().includes(searchTerm.toLowerCase()));
                    const matchManager = user?.role === 'manager' ? v.manager === user.name : true;
                    const isVisible = user?.role === 'manager' ? (v.status !== 'נמסר' && v.status !== 'לא נותנים') : true;
                    return matchSearch && matchManager && isVisible;
                });
            }, [cache, currentKey, searchTerm, user]);

            if (!user) return <Login onLogin={(u) => { setUser(u); sessionStorage.setItem('v_auth_final', JSON.stringify(u)); fetchData('04', '2026', false); }} />;

            return (
                <div className="min-h-screen pb-10">
                    <nav className="bg-[#0F172A] text-white p-4 sticky top-0 z-50 flex justify-between items-center border-b-2 border-yellow-500/20 shadow-xl">
                        <div className="flex flex-col">
                            <h1 className="text-xl font-black text-yellow-500 italic tracking-tighter leading-none">VOUCHER PRO</h1>
                            <span className="text-[8px] font-bold text-slate-400 uppercase tracking-widest mt-1">Credible Logistics</span>
                        </div>
                        <button onClick={() => { sessionStorage.clear(); window.location.reload(); }} className="p-2 bg-red-500/10 text-red-400 rounded-xl border border-red-500/20 active:scale-90 transition-all">
                            <i data-lucide="log-out" className="w-4 h-4"></i>
                        </button>
                    </nav>

                    <main className="max-w-xl mx-auto p-4 space-y-4">
                        <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-200 space-y-4">
                            <div className="relative">
                                <i data-lucide="search" className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5"></i>
                                <input 
                                    type="text" 
                                    placeholder="חיפוש חופשי..." 
                                    className="w-full bg-slate-50 border-2 border-slate-100 pr-12 py-3.5 rounded-2xl text-sm outline-none focus:border-blue-500 transition-all" 
                                    onChange={e => setSearchTerm(e.target.value)} 
                                />
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <div className="flex-1 flex bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                                    <select 
                                        value={year} 
                                        onChange={e => fetchData(month, e.target.value, false)} 
                                        className="bg-transparent text-xs font-bold flex-1 text-center outline-none cursor-pointer"
                                    >
                                        <option value="2026">2026</option>
                                        <option value="2025">2025</option>
                                    </select>
                                    <div className="w-px h-4 bg-slate-300 self-center"></div>
                                    <select 
                                        value={month} 
                                        onChange={e => fetchData(e.target.value, year, false)} 
                                        className="bg-transparent text-xs font-bold flex-1 text-center outline-none cursor-pointer"
                                    >
                                        {Object.entries(HEBREW_MONTHS).map(([v,n]) => <option key={v} value={v}>{n}</option>)}
                                    </select>
                                </div>
                                <button 
                                    onClick={() => fetchData(month, year, true)} 
                                    className="bg-blue-600 text-white p-3 rounded-2xl shadow-lg active:rotate-180 transition-all duration-500"
                                >
                                    <i data-lucide="refresh-cw" className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`}></i>
                                </button>
                            </div>
                        </div>

                        {errorMsg && <div className="bg-amber-50 text-amber-700 p-3 rounded-xl text-[10px] font-bold border border-amber-200 text-center italic">{errorMsg}</div>}

                        <div className="space-y-3">
                            {loading ? (
                                [1,2,3,4].map(i => (
                                    <div key={i} className="h-24 w-full rounded-[1.5rem] loading-shimmer border border-slate-100"></div>
                                ))
                            ) : vouchersToShow.length === 0 ? (
                                <div className="py-20 text-center text-slate-300 font-bold border-2 border-dashed border-slate-200 rounded-[2rem]">אין נתונים לחודש {HEBREW_MONTHS[month]}</div>
                            ) : (
                                vouchersToShow.map(v => (
                                    <div key={v.id} 
                                         className="bg-white rounded-[1.5rem] p-4 shadow-sm border border-slate-200 flex justify-between items-center"
                                         style={{ borderRight: `6px solid ${MANAGER_COLORS[v.manager] || '#cbd5e1'}` }}>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="text-[10px] font-bold px-2 py-0.5 rounded-lg bg-slate-100 text-slate-500 border border-slate-200 uppercase">{v.agency}</span>
                                                <span className="text-lg font-black text-blue-700 tracking-tighter">₪{v.amount}</span>
                                            </div>
                                            <h3 className="font-bold text-slate-800 truncate text-[15px]">{v.customerName}</h3>
                                            <p className="text-[10px] text-slate-400 font-bold mt-0.5">{v.importer} • סוכן: {v.agentName}</p>
                                        </div>
                                        <div className="mr-3">
                                            {user.role === 'manager' ? (
                                                <button onClick={() => handleUpdate(v.id, 'delivered')} className="h-14 w-14 bg-emerald-500 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                                                    <i data-lucide="check" className="w-8 h-8"></i>
                                                </button>
                                            ) : (
                                                <div className="flex flex-col items-end gap-1">
                                                    <div className={`px-3 py-1 rounded-full text-[10px] font-black border ${v.status === 'נמסר' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-amber-100 text-amber-700 border-amber-200'}`}>
                                                        {v.status || 'ממתין'}
                                                    </div>
                                                    <span className="text-[9px] text-slate-400 font-bold">{v.manager}</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        function Login({ onLogin }) {
            const [pin, setPin] = useState('');
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full text-center">
                        <div className="w-20 h-20 bg-slate-900 rounded-[2.5rem] flex items-center justify-center mx-auto mb-6 border-4 border-yellow-500 shadow-xl">
                            <span className="text-yellow-500 text-4xl font-black italic">V</span>
                        </div>
                        <h1 className="text-3xl font-black text-slate-800 tracking-tighter italic leading-none">VOUCHER PRO</h1>
                        <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2 mb-10">Credible Logistics</p>
                        <div className="space-y-4">
                            <input 
                                type="text" 
                                placeholder="קוד כניסה" 
                                className="w-full text-center text-2xl py-5 bg-slate-50 border-2 border-slate-100 rounded-3xl focus:border-yellow-500 focus:bg-white transition-all outline-none" 
                                value={pin}
                                onChange={e => setPin(e.target.value)} 
                            />
                            <button 
                                onClick={() => {
                                    const code = pin.toLowerCase().trim();
                                    if (code === ADMIN_CODE) onLogin({ role: 'admin', name: 'מנהל מערכת' });
                                    else if (AREA_MANAGERS[code]) onLogin({ role: 'manager', name: AREA_MANAGERS[code] });
                                    else alert("קוד שגוי");
                                }} 
                                className="w-full bg-[#0F172A] text-yellow-500 py-5 rounded-3xl font-black text-xl shadow-xl active:scale-95 transition-all border-b-4 border-yellow-600"
                            >התחברות</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
