        body {

            background-color: #F0F2F5; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; 
            width: 100%;
        }
        input, select, textarea {
            font-size: 16px !important;
        }
        .slide-out {
            animation: slideOut 0.5s forwards ease-in-out;
        }
        @keyframes slideOut {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; visibility: hidden; height: 0; padding: 0; margin: 0; }
        }
        .welcome-banner {
            animation: fadeInOut 2.5s forwards ease-in-out;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        .grid-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 0.8fr 0.8fr 40px;
            gap: 8px;
            align-items: center;
            text-align: center;
        }
        .grid-row > *:first-child {
            text-align: right;
        }
        .truncate-custom {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        function App() {
            const [user, setUser] = useState(null);
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(false);
            const [toast, setToast] = useState(null);
            const [welcomeBanner, setWelcomeBanner] = useState(false);
            const [removingId, setRemovingId] = useState(null);

            const now = new Date();
            const [filterMonth, setFilterMonth] = useState((now.getMonth() + 1).toString().padStart(2, '0'));
            const [filterYear, setFilterYear] = useState(now.getFullYear().toString());
            const [filterAgency, setFilterAgency] = useState('All');
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                const savedRole = sessionStorage.getItem('v_role');
                const savedName = sessionStorage.getItem('v_name');
                if (savedRole && savedName) setUser({ role: savedRole, name: savedName });
            }, []);

            useEffect(() => {
                if (user) fetchData(filterMonth, filterYear);
            }, [user, filterMonth, filterYear]);

            const fetchData = async (m, y) => {
                setLoading(true);
                try {
                    const response = await fetch(`${GOOGLE_WEB_APP_URL}?action=get&month=${m}&year=${y}`);
                    const res = await response.json();
                    if (res.status === 'success') setData(res.data || []);
                    else setData([]);
                } catch (e) { console.error(e); }
                finally { setLoading(false); }
            };

            const handleAction = async (id, actionType) => {
                if (user.role === 'manager') {
                    setRemovingId(id);
                    setTimeout(async () => {
                        setData(prev => prev.map(v => v.id === id ? { ...v, status: actionType } : v));
                        setRemovingId(null);
                        setToast('עודכן בהצלחה');
                        setTimeout(() => setToast(null), 2000);
                    }, 500);
                } else {
                    setData(prev => prev.map(v => v.id === id ? { ...v, status: actionType } : v));
                    setToast(actionType === 'נמסר' ? 'סומן כנמסר' : 'הוסר מהתצוגה');
                    setTimeout(() => setToast(null), 2000);
                }

                try {
                    await fetch(GOOGLE_WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'updateStatus', id, status: actionType, month: filterMonth, year: filterYear })
                    });
                } catch (e) { console.error(e); }
            };

            const agencies = useMemo(() => Array.from(new Set(data.map(v => v.agency).filter(Boolean))).sort(), [data]);

            const filteredData = useMemo(() => {
                const normalize = (s) => String(s || "").trim().toLowerCase();
                return data.filter(v => {
                    const rowMgr = normalize(v.manager);
                    const myName = normalize(user?.name);
                    
                    const isEhuddin = myName.includes('אהוד מועלם');
                    const isMyArea = user?.role === 'manager' 
                        ? (rowMgr.includes(myName) || myName.includes(rowMgr) || (isEhuddin && (rowMgr.includes('אודי') || rowMgr === 'אודי')))
                        : true;
                    
                    if (user?.role === 'manager' && (v.status === 'נמסר' || v.status === 'לא נותנים')) return false;

                    const mAgency = filterAgency === 'All' || v.agency === filterAgency;
                    const s = searchTerm.toLowerCase();
                    const mSearch = !s || [v.agentName, v.agency, v.customerName, v.importer].some(f => normalize(f).includes(s));
                    
                    return isMyArea && mAgency && mSearch;
                }).sort((a, b) => {
                    const w = (s) => s === 'נמסר' ? 1 : (s === 'לא נותנים' ? 2 : 0);
                    const wa = w(a.status), wb = w(b.status);
                    return wa !== wb ? wa - wb : (a.agency || "").localeCompare(b.agency || "", 'he');
                });
            }, [data, filterAgency, searchTerm, user]);

            const stats = useMemo(() => {
                return filteredData.reduce((acc, v) => {
                    const amt = Number(v.amount) || 0;
                    if (v.status !== 'לא נותנים') {
                        acc.total += amt; 
                        if (v.status === 'נמסר') acc.delivered += amt; 
                        else acc.pending += amt; 
                    }
                    return acc;
                }, { total: 0, pending: 0, delivered: 0 });
            }, [filteredData]);

            const exportToExcel = () => {
                let csv = 'לקוח,יבואן,סוכנות,סוכן,מנהל,סכום,סטטוס\n';
                filteredData.forEach(v => {
                    csv += `${v.customerName},${v.importer},${v.agency},${v.agentName},${v.manager},${v.amount},${v.status || 'ממתין'}\n`;
                });
                const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.setAttribute("download", `דוח_שוברים_${filterMonth}_${filterYear}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            if (!user) return <LoginScreen onLogin={(u) => { 
                setUser(u); 
                sessionStorage.setItem('v_role', u.role); 
                sessionStorage.setItem('v_name', u.name);
                setWelcomeBanner(true);
                setTimeout(() => setWelcomeBanner(false), 2500);
            }} />;

            return (
                <div className="min-h-screen pb-20 overflow-x-hidden w-full">
                    {welcomeBanner && (
                        <div className="fixed top-10 left-0 right-0 z-[100] flex justify-center pointer-events-none">
                            <div className="welcome-banner bg-[#262626] border border-[#f6d19c]/40 text-[#f6d19c] px-10 py-3 rounded-full shadow-2xl font-bold text-lg">
                                ברוך הבא, {user.name}
                            </div>
                        </div>
                    )}

                    <nav className="bg-[#262626] text-white shadow-lg sticky top-0 z-50 border-b border-[#9c7229]/40">
                        <div className="max-w-3xl mx-auto px-4 flex justify-between items-center py-3">
                            <div className="flex flex-col">
                                <Logo className="h-7 w-auto" lightMode={true} />
                                <span className="text-[10px] text-[#f6d19c] font-bold mt-1 bg-[#9c7229]/20 px-2 rounded w-fit">{user.name}</span>
                            </div>
                            <div className="flex gap-2">
                                {user.role === 'admin' && (
                                    <button onClick={exportToExcel} className="p-2 hover:bg-white/10 rounded-xl transition text-[#f6d19c]" title="ייצוא לאקסל">
                                        <Icons.FileText />
                                    </button>
                                )}
                                <button onClick={() => { sessionStorage.clear(); setUser(null); }} className="p-2 hover:bg-white/10 rounded-xl transition">
                                    <Icons.LogOut />
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-3xl mx-auto p-3 space-y-4">
                        <div className="bg-white rounded-2xl shadow-sm border p-3 space-y-3">
                            <div className="relative">
                                <div className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300"><Icons.Search /></div>
                                <input type="text" placeholder="חיפוש..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-slate-50 border rounded-xl pr-10 pl-4 py-2.5 text-[13px] outline-none" />
                            </div>
                            <div className="flex gap-2">
                                <select value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-slate-50 border rounded-xl py-2 px-3 text-[12px] flex-1">
                                    {HEBREW_MONTHS.map(m => <option key={m.v} value={m.v}>{m.n}</option>)}
                                </select>
                                <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="bg-slate-50 border rounded-xl py-2 px-3 text-[12px] flex-1">
                                    <option value="2024">2024</option>
                                    <option value="2025">2025</option>
                                    <option value="2026">2026</option>
                                </select>
                                <select value={filterAgency} onChange={e => setFilterAgency(e.target.value)} className="bg-slate-50 border rounded-xl py-2 px-3 text-[12px] flex-1">
                                    <option value="All">כל הסוכנויות</option>
                                    {agencies.map(a => <option key={a} value={a}>{a}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="grid grid-cols-3 gap-2">
                            <div className="bg-white p-3 rounded-2xl border-b-4 border-[#9c7229] text-center shadow-sm">
                                <p className="text-[10px] font-bold text-slate-400">סה"כ</p>
                                <p className="text-[14px] font-black">₪{stats.total.toLocaleString()}</p>
                            </div>
                            <div className="bg-[#262626] p-3 rounded-2xl border-b-4 border-black text-center text-white shadow-sm">
                                <p className="text-[10px] font-bold opacity-60">יתרה</p>
                                <p className="text-[14px] font-black">₪{stats.pending.toLocaleString()}</p>
                            </div>
                            <div className="bg-white p-3 rounded-2xl border-b-4 border-emerald-500 text-center text-slate-500 shadow-sm">
                                <p className="text-[10px] font-bold">נמסר</p>
                                <p className="text-[14px] font-black">₪{stats.delivered.toLocaleString()}</p>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                            <div className="bg-[#262626] text-white text-[10px] font-bold px-3 py-3 grid-row">
                                <span>לקוח</span><span>יבואן</span><span>סוכנות</span><span>מנהל</span><span>סכום</span><span></span>
                            </div>
                            {loading ? <div className="p-10 text-center"><div className="w-6 h-6 border-2 border-[#9c7229] border-t-transparent animate-spin rounded-full mx-auto"></div></div> :
                            filteredData.map((v, i) => (
                                <div key={v.id} className={`px-3 py-3 border-b last:border-0 grid-row ${removingId === v.id ? 'slide-out' : ''} ${v.status === 'נמסר' ? 'bg-emerald-50' : (v.status === 'לא נותנים' ? 'bg-red-50' : (i%2? 'bg-slate-50/50' : ''))}`}>
                                    <div className="truncate-custom">
                                        <p className="text-[11px] font-bold">{v.customerName}</p>
                                        <p className="text-[9px] text-slate-400">{v.agentName}</p>
                                    </div>
                                    <div className="text-[10px] truncate-custom">{v.importer || '-'}</div>
                                    <div className="text-[10px] font-bold text-slate-500 truncate-custom">{v.agency}</div>
                                    <div className="text-[10px] truncate-custom">{v.manager?.split(' ')[0]}</div>
                                    <div className="text-[11px] font-black">₪{v.amount}</div>
                                    <div className="flex justify-center">
                                        {user.role === 'admin' ? 
                                            (v.status === 'נמסר' ? <div className="text-emerald-500 font-bold"><Icons.Check/></div> : v.status === 'לא נותנים' ? <span className="text-red-500 font-black text-[12px]">X</span> : <button onClick={() => handleAction(v.id, 'לא נותנים')} className="text-slate-300 hover:text-red-400 transition"><Icons.Trash/></button>) :
                                            <button onClick={() => handleAction(v.id, 'נמסר')} className="w-7 h-7 bg-emerald-500 text-white rounded-lg flex items-center justify-center shadow-lg active:scale-90 transition"><Icons.Check/></button>
                                        }
                                    </div>
                                </div>
                            ))}
                            {!loading && filteredData.length === 0 && <div className="p-10 text-center text-slate-400 text-sm">אין נתונים להצגה</div>}
                        </div>
                    </main>
                    {toast && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-[#262626] text-[#f6d19c] px-6 py-2 rounded-full shadow-xl text-xs font-bold border border-[#9c7229] z-[200]">{toast}</div>}
                </div>
            );
        }

        function LoginScreen({ onLogin }) {
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = () => {
                const p = pin.trim().toLowerCase();
                if(p === ADMIN_CODE) {
                    onLogin({role:'admin', name:'מנהל מערכת'});
                } else if(AREA_MANAGERS[p]) {
                    onLogin({role:'manager', name:AREA_MANAGERS[p]});
                } else {
                    setError('קוד שגוי, אנא נסה שנית');
                    setPin('');
                    setTimeout(() => setError(''), 3000);
                }
            };

            return (
                <div className="min-h-screen bg-[#F0F2F5] flex flex-col items-center justify-center p-6 w-full">
                    <div className="bg-white p-8 rounded-[2rem] shadow-xl w-full max-w-[340px] text-center border-b-8 border-slate-200">
                        <Logo className="h-12 mx-auto mb-6" />
                        <h1 className="text-xl font-black mb-6 text-[#262626]">כניסה למערכת</h1>
                        
                        <input 
                            type="password" 
                            value={pin} 
                            onChange={e=>setPin(e.target.value)} 
                            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                            className="w-full text-center text-2xl py-3 bg-slate-50 border-2 rounded-xl mb-2 outline-none focus:border-[#9c7229] transition" 
                            placeholder="קוד כניסה" 
                        />
                        
                        {error && <p className="text-red-500 text-xs font-bold mb-4 animate-pulse">{error}</p>}
                        
                        <button 
                            onClick={handleSubmit} 
                            className="w-full bg-[#262626] text-[#f6d19c] py-4 rounded-xl font-bold shadow-lg active:scale-95 transition mt-2"
                        >
                            התחברות
                        </button>

                        <div className="mt-8 pt-6 border-t border-slate-100">
                             <p className="text-[10px] text-slate-400 font-medium">
                                * כל הזכויות שמורות לקרדיבל פלוס בע״מ
                             </p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
