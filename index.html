<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voucher Pro - Credible</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #F8FAFC; }
        .manager-card { transition: all 0.3s ease; }
        .manager-card:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // Configuration
        const GOOGLE_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwNtLKFJo43qD8zma3J4la0MGnRtxn6eX-uE0g943zL2DshAlRWkDmebXrkyEFkjR3_/exec';
        
        const AREA_MANAGERS = {
            '037122595': 'טירן סיגורה',
            '040476012': 'נחום נחום',
            '034887919': 'שי סיידון',
            '021710553': 'אהוד מועלם',
            '066436098': 'עזרא ירימי'
        };
        const ADMIN_CREDENTIAL = 'credible';
        const MANAGER_COLORS = {
            'טירן סיגורה': '#3b82f6',
            'נחום נחום': '#8b5cf6',
            'שי סיידון': '#10b981',
            'אהוד מועלם': '#f59e0b',
            'עזרא ירימי': '#ef4444',
        };
        const HEBREW_MONTHS = {
            '01': 'ינואר', '02': 'פברואר', '03': 'מרץ', '04': 'אפריל',
            '05': 'מאי', '06': 'יוני', '07': 'יולי', '08': 'אוגוסט',
            '09': 'ספטמבר', '10': 'אוקטובר', '11': 'נובמבר', '12': 'דצמבר'
        };

        function App() {
            const [authRole, setAuthRole] = useState(null);
            const [managerName, setManagerName] = useState('');
            const [vouchers, setVouchers] = useState([]);
            const [loading, setLoading] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [animatingOutIds, setAnimatingOutIds] = useState({});
            
            const now = new Date();
            const [filterMonth, setFilterMonth] = useState((now.getMonth() + 1).toString().padStart(2, '0'));
            const [filterYear, setFilterYear] = useState(now.getFullYear().toString());

            useEffect(() => {
                const r = sessionStorage.getItem('v_role');
                const n = sessionStorage.getItem('v_name');
                if (r) {
                    setAuthRole(r);
                    setManagerName(n);
                    fetchData(r, n, filterMonth, filterYear);
                }
            }, []);

            const fetchData = async (role, name, month, year) => {
                setLoading(true);
                setIsSyncing(true);
                try {
                    const response = await fetch(`${GOOGLE_WEB_APP_URL}?action=get&month=${month}&year=${year}`);
                    const res = await response.json();
                    if (res.status === 'success') {
                        setVouchers(res.data);
                    }
                } catch (e) {
                    console.error("Fetch error", e);
                } finally {
                    setLoading(false);
                    setIsSyncing(false);
                }
            };

            const handleUpdate = async (id, status) => {
                if (status === 'delivered') setAnimatingOutIds(p => ({ ...p, [id]: true }));
                
                setVouchers(prev => prev.map(v => v.id === id ? { ...v, status: status === 'delivered' ? 'נמסר' : 'לא נותנים' } : v));

                try {
                    await fetch(GOOGLE_WEB_APP_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'updateStatus', id, status })
                    });
                } catch (e) {
                    alert("שגיאה בעדכון הגיליון");
                } finally {
                    if (status === 'delivered') {
                        setTimeout(() => {
                            setAnimatingOutIds(p => { const n = {...p}; delete n[id]; return n; });
                        }, 500);
                    }
                }
            };

            const filteredData = useMemo(() => {
                return vouchers.filter(v => {
                    const s = searchTerm.toLowerCase();
                    const matchSearch = !s || [v.agentName, v.agency, v.customerName].some(f => String(f || '').toLowerCase().includes(s));
                    const matchManager = authRole === 'manager' ? v.manager === managerName : true;
                    const isVisible = authRole === 'manager' ? (v.status !== 'נמסר' && v.status !== 'לא נותנים' || animatingOutIds[v.id]) : true;
                    return matchSearch && matchManager && isVisible;
                });
            }, [vouchers, searchTerm, authRole, managerName, animatingOutIds]);

            if (!authRole) return <Login onLogin={(r, n) => { 
                setAuthRole(r); setManagerName(n); 
                sessionStorage.setItem('v_role', r); sessionStorage.setItem('v_name', n);
                fetchData(r, n, filterMonth, filterYear);
            }} />;

            return (
                <div className="min-h-screen pb-10">
                    <nav className="bg-[#1E293B] text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg border-b-2 border-yellow-600/30">
                        <div>
                            <h1 className="text-xl font-black text-yellow-500 tracking-tighter">VOUCHER PRO</h1>
                            <p className="text-[10px] text-slate-400 font-bold uppercase">Credible Logistics</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="text-xs font-bold text-yellow-500 bg-white/5 px-2 py-1 rounded border border-white/10">{managerName}</span>
                            <button onClick={() => { sessionStorage.clear(); window.location.reload(); }} className="p-2 bg-red-500/20 text-red-400 rounded-lg">
                                <i data-lucide="log-out" className="w-4 h-4"></i>
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-2xl mx-auto p-4 space-y-4">
                        <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 space-y-4">
                            <input 
                                type="text" 
                                placeholder="חפש לקוח, סוכן או סוכנות..." 
                                className="w-full bg-slate-50 border-2 border-slate-100 px-4 py-3 rounded-2xl text-sm outline-none focus:border-blue-500/50" 
                                onChange={e => setSearchTerm(e.target.value)} 
                            />
                            <div className="flex justify-between items-center">
                                <div className="flex gap-2 bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                                    <select value={filterYear} onChange={e => { setFilterYear(e.target.value); fetchData(authRole, managerName, filterMonth, e.target.value); }} className="bg-transparent text-xs font-bold outline-none">
                                        <option value="2025">2025</option>
                                        <option value="2024">2024</option>
                                    </select>
                                    <select value={filterMonth} onChange={e => { setFilterMonth(e.target.value); fetchData(authRole, managerName, e.target.value, filterYear); }} className="bg-transparent text-xs font-bold outline-none">
                                        {Object.entries(HEBREW_MONTHS).map(([v,n]) => <option key={v} value={v}>{n}</option>)}
                                    </select>
                                </div>
                                <button onClick={() => fetchData(authRole, managerName, filterMonth, filterYear)} className="flex items-center gap-1 text-xs font-bold text-blue-600">
                                    <i data-lucide="refresh-cw" className={`w-3 h-3 ${isSyncing ? 'animate-spin' : ''}`}></i> רענן
                                </button>
                            </div>
                        </div>

                        <div className="space-y-3">
                            {loading ? (
                                <div className="py-20 text-center animate-pulse text-slate-400 font-bold italic">טוען נתונים מהגיליון...</div>
                            ) : filteredData.map(v => (
                                <div key={v.id} 
                                     className={`bg-white rounded-2xl p-4 shadow-sm border border-slate-200 manager-card flex justify-between items-center transition-all duration-500
                                     ${animatingOutIds[v.id] ? 'opacity-0 translate-x-10' : 'opacity-100'}`}
                                     style={{ borderRight: `6px solid ${MANAGER_COLORS[v.manager] || '#cbd5e1'}` }}>
                                    <div>
                                        <div className="flex items-center gap-2 mb-1">
                                            <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-slate-100 text-slate-500">{v.agency}</span>
                                            <span className="text-lg font-black text-blue-700">₪{v.amount}</span>
                                        </div>
                                        <h3 className="font-bold text-slate-800 truncate">{v.customerName}</h3>
                                        <p className="text-xs text-slate-400">סוכן: {v.agentName} | יבואן: {v.importer}</p>
                                    </div>
                                    {authRole === 'manager' ? (
                                        <button onClick={() => handleUpdate(v.id, 'delivered')} className="h-12 w-12 bg-emerald-500 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-100">
                                            <i data-lucide="check" className="w-7 h-7"></i>
                                        </button>
                                    ) : (
                                        <div className={`px-3 py-1 rounded-full text-[10px] font-bold ${v.status === 'נמסר' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>
                                            {v.status || 'ממתין'}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        function Login({ onLogin }) {
            const [pin, setPin] = useState('');
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full border-b-[10px] border-slate-300">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <span className="text-yellow-500 text-3xl font-black">V</span>
                            </div>
                            <h1 className="text-2xl font-black text-slate-800">VOUCHER PRO</h1>
                            <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Credible Logistics</p>
                        </div>
                        <div className="space-y-4">
                            <input 
                                type="password" 
                                placeholder="קוד כניסה" 
                                className="w-full text-center text-3xl py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none transition-all" 
                                onChange={e => setPin(e.target.value)} 
                            />
                            <button 
                                onClick={() => {
                                    if (pin === ADMIN_CREDENTIAL) onLogin('admin', 'מנהל מערכת');
                                    else if (AREA_MANAGERS[pin]) onLogin('manager', AREA_MANAGERS[pin]);
                                    else alert("קוד שגוי");
                                }} 
                                className="w-full bg-slate-900 text-yellow-500 py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all"
                            >כניסה</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize icons after React render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
